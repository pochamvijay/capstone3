<!DOCTYPE html>

<html>

<head>

    <title>CV Generator</title>

    <style>

        body{

            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        .container{

            width: 400px;
            background: white;
            padding: 30px;
            margin: 40px auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1{

            text-align: center;
            color: darkblue;
            margin-bottom: 30px;
        }

        input, textarea{

            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 20px;
            border: 1px solid gray;
            border-radius: 5px;
            font-size: 16px;
        }

        textarea{

            height: 80px;
        }

        button{

            width: 100%;
            padding: 12px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover{

            background-color: darkblue;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>CV Generator</h1>

        <form method="POST">

            {% csrf_token %}

            <input type="text" name="name" placeholder="Enter Name">

            <input type="email" name="email" placeholder="Enter Email">

            <input type="text" name="mobile" placeholder="Enter Mobile">

            <input type="text" name="degree" placeholder="Enter Degree">

            <textarea name="about" placeholder="About Yourself"></textarea>

            <input type="text" name="university" placeholder="University">

            <input type="text" name="school" placeholder="School">

            <input type="text" name="previous_work" placeholder="Previous Work">

            <input type="text" name="skills" placeholder="Skills">

            <button type="submit">

                Generate Resume

            </button>

        </form>

    </div>

</body>

</html>
